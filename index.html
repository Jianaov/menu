<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack AOV - Profile Links</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chèn FontAwesome để dùng các icon mạng xã hội -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div class="container">
        <!-- Thanh trạng thái trên cùng (Icon Thông báo & Mặt trời) -->
        <div class="top-bar">
            <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
            <button class="icon-btn"><i class="fa-regular fa-sun"></i></button>
        </div>

        <!-- Phần Thông tin cá nhân -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://placeholder.com" alt="Avatar" class="avatar">
            </div>
            <p class="greeting">Hi, i am</p>
            <h1 class="name">Zack AOV <i class="fa-solid fa-circle-check verify-badge"></i></h1>
            <p class="sub-title">and I'm a <span class="highlight">Developer.</span></p>
        </div>

        <!-- Các nút mạng xã hội tròn -->
        <div class="social-icons">
            <a href="#" class="social-btn telegram"><i class="fa-brands fa-telegram"></i></a>
            <a href="#" class="social-btn youtube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" class="social-btn discord"><i class="fa-brands fa-discord"></i></a>
        </div>

        <!-- Khu vực chứa các liên kết chính bên dưới -->
        <div class="links-card">
            
            <div class="link-item">
                <p class="link-title">Website Mua Key Không Cần Vượt</p>
                <a href="#" class="action-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
            </div>

            <div class="link-item">
                <p class="link-title">Acc Liên Quân Miễn Phí</p>
                <a href="#" class="action-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
            </div>

            <div class="link-item">
                <p class="link-title">Telegram Group</p>
                <a href="#" class="action-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
            </div>

            <!-- Nhãn chân trang hiển thị tên miền -->
            <div class="footer-domain">
                <span>zackaov.com</span>
            </div>

        </div>
    </div>

</body>
</html>
